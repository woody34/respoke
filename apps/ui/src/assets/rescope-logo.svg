  <circle cx="6" cy="16" r="1" fill="#3fb950" opacity="0.5"/>
  <circle cx="26" cy="16" r="1" fill="#3fb950" opacity="0.5"/>

  <!-- R letterform -->
  <!-- Vertical stem -->
